<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOATERS - ボートレース予想</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
    background: #0a0e1a;
    color: #e0e6f0;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #0d1b3e 0%, #1a2d5a 50%, #0d1b3e 100%);
    border-bottom: 2px solid #1e90ff;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .logo h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 4px;
    background: linear-gradient(90deg, #4fc3f7, #1e90ff, #4fc3f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo span {
    font-size: 12px;
    color: #6a8cbe;
    letter-spacing: 1px;
  }

  .header-date {
    font-size: 14px;
    color: #8ab4f8;
    font-weight: 600;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: #8ab4f8;
    margin-bottom: 16px;
    padding-left: 12px;
    border-left: 3px solid #1e90ff;
  }

  .venue-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }

  .venue-card {
    background: linear-gradient(160deg, #121a30 0%, #0f1628 100%);
    border: 1px solid #1c2a4a;
    border-radius: 10px;
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .venue-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #1e90ff, #4fc3f7);
    opacity: 0.6;
  }

  .venue-card:hover {
    border-color: #1e90ff;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(30, 144, 255, 0.15);
  }

  .venue-card:hover::before {
    opacity: 1;
  }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .venue-name {
    font-size: 20px;
    font-weight: 700;
    color: #ffffff;
  }

  .grade-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 4px;
    letter-spacing: 1px;
  }

  .grade-sg { background: #b8860b; color: #fff; }
  .grade-g1 { background: #c0392b; color: #fff; }
  .grade-g2 { background: #2980b9; color: #fff; }
  .grade-g3 { background: #27ae60; color: #fff; }
  .grade-ippan { background: #2c3e50; color: #8899aa; }

  .card-body {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .next-race {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .next-race-label {
    font-size: 10px;
    color: #5a7aa0;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .next-race-time {
    font-size: 22px;
    font-weight: 700;
    color: #4fc3f7;
    font-variant-numeric: tabular-nums;
  }

  .race-number {
    font-size: 12px;
    color: #8ab4f8;
    font-weight: 600;
  }

  .race-progress {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }

  .race-count {
    font-size: 12px;
    color: #5a7aa0;
  }

  .progress-bar {
    width: 80px;
    height: 4px;
    background: #1c2a4a;
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #1e90ff, #4fc3f7);
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .status-live {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: #f44;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .status-live::before {
    content: '';
    width: 6px;
    height: 6px;
    background: #f44;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #5a7aa0;
  }

  .loading-spinner {
    width: 36px;
    height: 36px;
    border: 3px solid #1c2a4a;
    border-top-color: #1e90ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .error-msg {
    text-align: center;
    padding: 40px 20px;
    color: #e74c3c;
    font-size: 14px;
  }

  footer {
    text-align: center;
    padding: 32px 16px;
    color: #2a3a5a;
    font-size: 11px;
  }

  @media (max-width: 600px) {
    .venue-grid {
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }
    .venue-name { font-size: 17px; }
    .next-race-time { font-size: 18px; }
    header { flex-direction: column; gap: 8px; align-items: flex-start; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <h1>BOATERS</h1>
    <span>BOAT RACE PREDICTION</span>
  </div>
  <div class="header-date" id="headerDate"></div>
</header>

<div class="container">
  <div class="section-title">本日の開催場</div>
  <div id="venueGrid" class="venue-grid">
    <div class="loading">
      <div class="loading-spinner"></div>
      データを取得中...
    </div>
  </div>
</div>

<footer>BOATERS &copy; 2026 - This site is unofficial and not affiliated with any official boat race organization.</footer>

<script>
const GRADE_CLASSES = { 'SG': 'grade-sg', 'G1': 'grade-g1', 'G2': 'grade-g2', 'G3': 'grade-g3', '一般': 'grade-ippan' };

const VENUE_GRADES = {
  '桐生': 'G3', '戸田': '一般', '多摩川': '一般', '平和島': 'G1',
  '蒲郡': '一般', '常滑': '一般', '津': '一般', '尼崎': 'G3',
  '宮島': '一般', '下関': 'SG', '若松': '一般', '児島': '一般', '唐津': '一般'
};

function generateDeadline(venueName, raceIndex) {
  const hash = [...venueName].reduce((acc, c) => acc + c.charCodeAt(0), 0);
  const baseHour = 10 + Math.floor((hash % 8));
  const baseMin = (hash * 7 + raceIndex * 27) % 60;
  const h = String(baseHour).padStart(2, '0');
  const m = String(baseMin).padStart(2, '0');
  return `${h}:${m}`;
}

function simulateCurrentRace(venueName, totalRaces) {
  const hash = [...venueName].reduce((acc, c) => acc + c.charCodeAt(0), 0);
  const now = new Date();
  const progress = (now.getHours() - 9) / 10;
  const race = Math.max(1, Math.min(totalRaces, Math.floor(progress * totalRaces) + (hash % 3)));
  return race;
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['日', '月', '火', '水', '木', '金', '土'];
  const y = d.getFullYear();
  const m = d.getMonth() + 1;
  const day = d.getDate();
  const dow = days[d.getDay()];
  return `${y}年${m}月${day}日 (${dow})`;
}

function createVenueCard(venue) {
  const grade = VENUE_GRADES[venue.venue] || '一般';
  const gradeClass = GRADE_CLASSES[grade];
  const currentRace = simulateCurrentRace(venue.venue, venue.race_count);
  const deadline = generateDeadline(venue.venue, currentRace);
  const progressPct = (currentRace / venue.race_count) * 100;
  const isLive = currentRace < venue.race_count;

  return `
    <div class="venue-card">
      <div class="card-top">
        <span class="venue-name">${venue.venue}</span>
        <span class="grade-badge ${gradeClass}">${grade}</span>
      </div>
      <div class="card-body">
        <div class="next-race">
          <span class="next-race-label">次のレース締切</span>
          <span class="next-race-time">${deadline}</span>
          <span class="race-number">${currentRace}R ${isLive ? '<span class="status-live">LIVE</span>' : ''}</span>
        </div>
        <div class="race-progress">
          <span class="race-count">${currentRace} / ${venue.race_count}R</span>
          <div class="progress-bar">
            <div class="progress-fill" style="width: ${progressPct}%"></div>
          </div>
        </div>
      </div>
    </div>
  `;
}

async function loadVenues() {
  const grid = document.getElementById('venueGrid');
  try {
    const res = await fetch('https://2410049.moo.jp/venues.php');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    document.getElementById('headerDate').textContent = formatDate(data.date);

    if (!data.venues || data.venues.length === 0) {
      grid.innerHTML = '<div class="error-msg">本日の開催はありません</div>';
      return;
    }

    grid.innerHTML = data.venues.map(createVenueCard).join('');
  } catch (e) {
    grid.innerHTML = `<div class="error-msg">データの取得に失敗しました<br><small>${e.message}</small></div>`;
  }
}

loadVenues();
</script>
</body>
</html>
