name: 艇王 ロリポップへFTPデプロイ

# 必要なGitHub Secrets:
#   FTP_HOST : ロリポップのFTPホスト名
#   FTP_USER : FTPユーザー名
#   FTP_PASS : FTPパスワード
# 設定場所: リポジトリの Settings > Secrets and variables > Actions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: FTPデプロイ
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/*.py
            **/*.yml
            **/*.md
            **/auth.php
