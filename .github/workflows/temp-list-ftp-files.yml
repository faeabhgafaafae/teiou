name: 一時 FTPファイル一覧取得(読み取り専用・使い捨て)

on:
  workflow_dispatch:

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - name: 本番のみに存在するファイルの中身を取得
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          set -e
          for f in aaa.html cron_get_data.py import_fan.php livetest.php livetest_api.php plan.php upload.html venues.php; do
            echo "##### $f #####"
            curl -sS --user "$FTP_USER:$FTP_PASS" "ftp://$FTP_HOST/$f" || echo "(取得失敗)"
            echo ""
            echo "##### /$f end #####"
          done
