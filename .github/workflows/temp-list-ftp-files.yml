name: 一時 FTPファイル一覧取得(読み取り専用・使い捨て)

on:
  workflow_dispatch:

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - name: FTPディレクトリ一覧取得
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          set -e
          echo "=== ルート直下 ==="
          curl -sS --user "$FTP_USER:$FTP_PASS" "ftp://$FTP_HOST/" -l
          echo ""
          echo "=== migrations/ ==="
          curl -sS --user "$FTP_USER:$FTP_PASS" "ftp://$FTP_HOST/migrations/" -l || echo "(ディレクトリなし or 空)"
