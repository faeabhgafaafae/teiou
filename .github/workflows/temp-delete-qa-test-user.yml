name: 一時 QA検証テストユーザー削除(使い捨て)

on:
  workflow_dispatch:
    inputs:
      email:
        description: '削除対象のテストアカウントemail(teiou-internal-test.exampleドメインのみ許可)'
        required: true

jobs:
  run-and-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: スクリプト生成・アップロード・実行・削除
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          API_KEY: ${{ secrets.API_KEY }}
          QA_TEST_EMAIL: ${{ github.event.inputs.email }}
        run: |
          set -e
          cat > diag_delete_qa_test_user.php << 'PHPEOF'
          <?php
          /**
           * temp: QA検証用テストアカウント削除エンドポイント(実行後に削除)
           */
          define('DB_HOST', 'mysql323.phy.lolipop.lan');
          define('DB_NAME', 'LAA1670504-12');
          define('DB_USER', 'LAA1670504');
          define('DB_PASS', 'teiou');
          define('API_KEY', 'teio2025');

          header('Content-Type: application/json; charset=utf-8');

          $api_key = $_GET['api_key'] ?? '';
          if ($api_key !== API_KEY) {
              http_response_code(403);
              echo json_encode(['error' => 'Forbidden']);
              exit;
          }

          $email = $_GET['email'] ?? '';
          if (!$email || strpos($email, 'teiou-internal-test.example') === false) {
              http_response_code(400);
              echo json_encode(['error' => 'このスクリプトは teiou-internal-test.example ドメインのテストアカウントのみ削除できます']);
              exit;
          }

          $pdo = new PDO(
              'mysql:host=' . DB_HOST . ';dbname=' . DB_NAME . ';charset=utf8mb4',
              DB_USER, DB_PASS,
              [PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION, PDO::ATTR_DEFAULT_FETCH_MODE => PDO::FETCH_ASSOC]
          );

          $stmt = $pdo->prepare('SELECT id, email, plan FROM users WHERE email = ?');
          $stmt->execute([$email]);
          $user = $stmt->fetch();

          if (!$user) {
              echo json_encode(['found' => false]);
              exit;
          }
          $userId = (int)$user['id'];

          $pdo->beginTransaction();
          try {
              $del1 = $pdo->prepare('DELETE FROM user_picks WHERE user_id = ?');
              $del1->execute([$userId]);
              $picksDeleted = $del1->rowCount();

              $del2 = $pdo->prepare('DELETE FROM user_favorites WHERE user_id = ?');
              $del2->execute([$userId]);
              $favDeleted = $del2->rowCount();

              $del3 = $pdo->prepare('DELETE FROM users WHERE id = ?');
              $del3->execute([$userId]);
              $userDeleted = $del3->rowCount();

              $pdo->commit();

              echo json_encode([
                  'success'       => true,
                  'user_id'       => $userId,
                  'picks_deleted' => $picksDeleted,
                  'fav_deleted'   => $favDeleted,
                  'user_deleted'  => $userDeleted,
              ], JSON_UNESCAPED_UNICODE);
          } catch (Exception $e) {
              $pdo->rollBack();
              http_response_code(500);
              echo json_encode(['success' => false, 'error' => $e->getMessage()]);
          }
          PHPEOF

          echo "--- uploading ---"
          curl -sS -T diag_delete_qa_test_user.php --user "$FTP_USER:$FTP_PASS" "ftp://$FTP_HOST/diag_delete_qa_test_user.php"

          sleep 2

          echo "--- executing deletion ---"
          curl -sS "https://2410049.moo.jp/diag_delete_qa_test_user.php?api_key=$API_KEY&email=$QA_TEST_EMAIL"
          echo ""

          echo "--- removing script from server ---"
          curl -sS --user "$FTP_USER:$FTP_PASS" "ftp://$FTP_HOST/" -Q "DELE diag_delete_qa_test_user.php"

          rm -f diag_delete_qa_test_user.php
