name: 一時 本番不要ファイル削除(使い捨て)

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: 不要ファイルをFTP削除
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          set -e
          for f in aaa.html plan.php livetest.php livetest_api.php; do
            echo "--- deleting $f ---"
            curl -sS --user "$FTP_USER:$FTP_PASS" "ftp://$FTP_HOST/" -Q "DELE $f"
          done
          echo "--- 削除後の一覧確認 ---"
          curl -sS --user "$FTP_USER:$FTP_PASS" "ftp://$FTP_HOST/" -l
