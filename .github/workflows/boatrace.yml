name: 艇王 自動データ取得

on:
  schedule:
    - cron: '0 22 * * *'   # JST 7:00 出走表・直前情報取得
    - cron: '0 11 * * *'   # JST 20:00 競走成績取得
  workflow_dispatch:        # 手動実行も可能

jobs:
  # ─── 毎朝7時: 出走表・直前情報取得 ───────────────────
  # 当日全オッズ取得は別ジョブに分離(scrape_odds)。
  # 同一ジョブ内で直列実行すると、出走表・直前情報だけで70分前後を
  # 使い切ってしまい、オッズ取得がtimeout-minutesの残り時間しか
  # もらえず毎回打ち切られていたため(2026-07-13〜14に連日発生)。
  scrape_beforeinfo:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 22 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONUNBUFFERED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: 出走表スクレイピング
        env:
          API_URL_RACELIST: ${{ secrets.API_URL_RACELIST }}
          API_KEY: ${{ secrets.API_KEY }}
        run: python scrape_racelist.py

      - name: 直前情報スクレイピング
        env:
          API_URL: ${{ secrets.API_URL_BEFOREINFO }}
          API_KEY: ${{ secrets.API_KEY }}
        run: python scrape_boatrace.py

  # ─── scrape_beforeinfoの直後: 当日全オッズ取得 ────────
  # 出走表さえ登録されていれば動くため、直前情報の完了を待つ必要はないが、
  # ジョブを分けてtimeout-minutesを独立させることが目的なのでneedsで直列化する。
  scrape_odds:
    needs: scrape_beforeinfo
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 22 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONUNBUFFERED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: 当日全オッズ取得
        env:
          API_PENDING: ${{ secrets.API_PENDING }}
          API_ODDS: ${{ secrets.API_URL_ODDS }}
          API_KEY: ${{ secrets.API_KEY }}
        run: python scrape_odds_all.py

  # ─── 毎夜20時: 競走成績取得 ──────────────────────────
  fetch_results:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 11 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get install -y p7zip-full
          pip install requests

      # 結果取込み(import_results.php)は、この時点で既に存在する strategies
      # としか照合しないため、閲覧されなかったレースが的中速報に永久に
      # 反映されない問題があった。結果取込みの前に全レース分の戦略買い目を
      # 機械的に生成しておくことで、閲覧有無に関係なく網羅する。
      # tmp: exit-code伝播修正の動作確認用に接続先を意図的に無効化(確認後にneutralize予定)
      - name: 前日分の戦略買い目を事前生成
        env:
          API_VENUES: "https://127.0.0.1:9/venues.php"
        run: |
          YESTERDAY=$(date -d 'yesterday' +%Y-%m-%d)
          python generate_strategies_for_date.py --date $YESTERDAY

      # tmp: exit-code伝播修正の動作確認用に接続先を意図的に無効化(確認後にneutralize予定)
      - name: 競走成績取得
        env:
          API_URL: "https://127.0.0.1:9/import_results.php"
          API_URL_PAYOUTS: "https://127.0.0.1:9/save_payouts.php"
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          YESTERDAY=$(date -d 'yesterday' +%Y-%m-%d)
          python download_results.py --start $YESTERDAY --end $YESTERDAY
