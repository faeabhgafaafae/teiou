<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>艇王 - レース一覧</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Hiragino Sans', 'Meiryo', sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }
header { background: #fff; border-bottom: 3px solid #0055a4; padding: 12px 20px; display: flex; align-items: center; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo a { text-decoration: none; display: flex; align-items: center; gap: 10px; }
.logo h1 { font-size: 24px; font-weight: 800; letter-spacing: 3px; color: #0055a4; }
.logo-sub { font-size: 11px; color: #888; letter-spacing: 1px; }
.container { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }
.grade-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 3px; letter-spacing: 0.5px; }
.grade-sg { background: #fff3cd; color: #b8860b; }
.grade-g1 { background: #fee2e2; color: #c0392b; }
.grade-g2 { background: #dbeafe; color: #2563eb; }
.grade-g3 { background: #d1fae5; color: #16a34a; }
.grade-ippan { background: #f3f4f6; color: #888; }
.loading { text-align: center; padding: 60px 20px; color: #999; }
.loading-spinner { width: 32px; height: 32px; border: 3px solid #e0e3e8; border-top-color: #0055a4; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg { background: #fef2f2; border: 1px solid #fca5a5; border-radius: 10px; padding: 16px; color: #dc2626; font-size: 14px; }
footer { text-align: center; padding: 28px 16px; color: #bbb; font-size: 11px; }

/* --- ヘッダー --- */
header {
  gap: 14px;
  justify-content: space-between;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.back-btn {
  color: #0055a4;
  text-decoration: none;
  font-size: 20px;
  line-height: 1;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  transition: background 0.15s;
}

.back-btn:hover { background: #e8f0fd; }

.header-info h1 {
  font-size: 18px;
  font-weight: 700;
  color: #222;
  line-height: 1.3;
}

.header-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 2px;
}

.header-meta .date {
  font-size: 12px;
  color: #888;
}

.header-right-area {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* --- 節タイトルバナー --- */
.venue-banner {
  background: linear-gradient(135deg, #0055a4, #0070cc);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 20px;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.venue-banner-left h2 {
  font-size: 18px;
  font-weight: 700;
}

.venue-banner-left p {
  font-size: 12px;
  opacity: 0.8;
  margin-top: 2px;
}

.venue-banner-right {
  text-align: right;
}

.venue-banner-right .race-total {
  font-size: 22px;
  font-weight: 800;
}

.venue-banner-right .race-total-label {
  font-size: 10px;
  opacity: 0.7;
}

/* --- レースカード --- */
.race-card {
  background: #fff;
  border: 1px solid #e0e3e8;
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: box-shadow 0.15s;
}

.race-card:hover {
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

.race-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid #eee;
}

.race-header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.race-no {
  font-size: 16px;
  font-weight: 800;
  color: #0055a4;
  min-width: 36px;
}

.race-time {
  font-size: 14px;
  color: #333;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

.race-time-label {
  font-size: 10px;
  color: #999;
  font-weight: 400;
  margin-right: 2px;
}

.race-header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.status-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: 0.5px;
}

.status-yosen { background: #dbeafe; color: #2563eb; }
.status-junyu { background: #d1fae5; color: #16a34a; }
.status-kakutei { background: #f3f4f6; color: #888; }
.status-live { background: #fee2e2; color: #dc2626; }

/* --- 選手テーブル --- */
.player-table {
  width: 100%;
}

.player-row {
  display: flex;
  align-items: center;
  padding: 7px 16px;
  border-bottom: 1px solid #f5f5f5;
  gap: 8px;
}

.player-row:last-child { border-bottom: none; }

.player-row:hover { background: #fafbfc; }

.waku {
  width: 26px;
  height: 26px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 13px;
  flex-shrink: 0;
}

.waku-1 { background: #fff; color: #222; border: 2px solid #ccc; }
.waku-2 { background: #222; color: #fff; }
.waku-3 { background: #e53e3e; color: #fff; }
.waku-4 { background: #2563eb; color: #fff; }
.waku-5 { background: #eab308; color: #222; }
.waku-6 { background: #16a34a; color: #fff; }

.player-id {
  font-size: 11px;
  color: #999;
  min-width: 36px;
  flex-shrink: 0;
}

.player-name {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  color: #222;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.player-grade {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 3px;
  flex-shrink: 0;
}

.pg-A1 { background: #fff3cd; color: #b8860b; }
.pg-A2 { background: #dbeafe; color: #2563eb; }
.pg-B1 { background: #f3f4f6; color: #666; }
.pg-B2 { background: #f3f4f6; color: #aaa; }

.player-stats {
  display: flex;
  gap: 12px;
  flex-shrink: 0;
}

.player-stat {
  font-size: 11px;
  color: #999;
  text-align: right;
}

.player-stat strong {
  color: #333;
  font-weight: 600;
}

.player-stat-label {
  font-size: 9px;
  color: #bbb;
  display: block;
}

/* --- アクションボタン --- */
.race-actions {
  display: flex;
  gap: 6px;
  padding: 8px 16px;
  border-top: 1px solid #f0f0f0;
}

.action-btn {
  flex: 1;
  padding: 8px 4px;
  border: 1px solid #e0e3e8;
  border-radius: 8px;
  background: #fff;
  font-size: 12px;
  font-weight: 600;
  color: #555;
  cursor: pointer;
  text-align: center;
  text-decoration: none;
  transition: all 0.15s;
}

.action-btn:hover {
  border-color: #0055a4;
  color: #0055a4;
  background: #f0f5ff;
}

.action-btn.primary {
  background: #0055a4;
  color: #fff;
  border-color: #0055a4;
}

.action-btn.primary:hover {
  background: #003d7a;
}

.player-loading {
  padding: 24px 16px;
  text-align: center;
  color: #bbb;
  font-size: 13px;
}

.container {
  max-width: 800px;
}

@media (max-width: 600px) {
  .venue-banner { flex-direction: column; align-items: flex-start; gap: 8px; padding: 14px 16px; }
  .venue-banner-right { text-align: left; }
  .player-row { padding: 6px 12px; gap: 6px; }
  .player-name { font-size: 13px; }
  .player-id { display: none; }
  .player-stats { display: none; }
  .race-actions { gap: 4px; padding: 8px 12px; }
  .action-btn { font-size: 11px; padding: 7px 2px; }
  .header-info h1 { font-size: 16px; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <a class="back-btn" href="index.html">&larr;</a>
    <div class="header-info">
      <h1 id="pageTitle">レース一覧</h1>
      <div class="header-meta">
        <span class="date" id="pageDate"></span>
        <span class="grade-badge" id="pageBadge"></span>
      </div>
    </div>
  </div>
</header>

<div class="container">
  <div class="venue-banner" id="venueBanner" style="display:none">
    <div class="venue-banner-left">
      <h2 id="bannerTitle"></h2>
      <p id="bannerSub"></p>
    </div>
    <div class="venue-banner-right">
      <div class="race-total" id="bannerTotal">-</div>
      <div class="race-total-label">レース</div>
    </div>
  </div>

  <div id="raceList">
    <div class="loading">
      <div class="loading-spinner"></div>
      レース情報を取得中...
    </div>
  </div>
</div>

<footer>艇王 &copy; 2026</footer>

<script>
var params = new URLSearchParams(location.search);
var venue = params.get('venue') || '';
var date  = params.get('date')  || today();

function today() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

var VENUE_GRADES = {
  '桐生':'G3','戸田':'一般','江戸川':'一般','平和島':'G1','多摩川':'一般',
  '浜名湖':'一般','蒲郡':'一般','常滑':'一般','津':'一般','三国':'一般',
  'びわこ':'一般','住之江':'G2','尼崎':'G3','鳴門':'一般','丸亀':'一般',
  '児島':'一般','宮島':'一般','徳山':'一般','下関':'SG','若松':'一般',
  '芦屋':'一般','福岡':'一般','唐津':'一般','大村':'一般'
};
var GRADE_CLASSES = { 'SG':'grade-sg','G1':'grade-g1','G2':'grade-g2','G3':'grade-g3','一般':'grade-ippan' };

var venueGrade = VENUE_GRADES[venue] || '一般';
var gradeClass = GRADE_CLASSES[venueGrade];

document.getElementById('pageTitle').textContent = venue + ' レース一覧';
document.getElementById('pageDate').textContent = formatDateJP(date);
document.title = '艇王 - ' + venue;

var badge = document.getElementById('pageBadge');
badge.textContent = venueGrade;
badge.className = 'grade-badge ' + gradeClass;

function formatDateJP(dateStr) {
  var d = new Date(dateStr + 'T00:00:00');
  var days = ['日','月','火','水','木','金','土'];
  return (d.getMonth()+1) + '/' + d.getDate() + ' (' + days[d.getDay()] + ')';
}

function formatName(name) {
  return name.replace(/[\s　]+/g, ' ').trim();
}

function getRaceStatus(scheduledTime) {
  if (!scheduledTime) return { text: '予選', cls: 'status-yosen' };
  var now = new Date();
  var parts = scheduledTime.split(':').map(Number);
  var h = parts[0];
  var m = parts[1];
  var raceTime = new Date();
  raceTime.setHours(h, m, 0, 0);
  if (now > raceTime) return { text: '結果確定', cls: 'status-kakutei' };
  var diff = raceTime - now;
  if (diff < 10 * 60 * 1000) return { text: '締切間近', cls: 'status-live' };
  return { text: '予選', cls: 'status-yosen' };
}

var API_HOST = 'https://' + '2410049.moo.jp';
var BR_HOST = 'https://' + 'www.boatrace.jp';

function buildApiUrl(endpoint, params) {
  var qs = Object.keys(params).map(function(k) {
    return k + '=' + encodeURIComponent(params[k]);
  }).join('&');
  return API_HOST + '/' + endpoint + '?' + qs;
}

function buildBoatraceUrl(raceNo) {
  var hd = date.replace(/-/g, '');
  return BR_HOST + '/owpc/pc/race/racelist' + '?hd=' + hd + '&rno=' + raceNo;
}

function buildPredictUrl(raceNo) {
  return 'predict.html' + '?venue=' + encodeURIComponent(venue) + '&date=' + date + '&race_no=' + raceNo;
}

function renderPlayerRow(p) {
  var pgClass = 'pg-' + p.grade.replace(/\s/g, '');
  var natRate = p.win_rate_national != null ? p.win_rate_national.toFixed(2) : '-';
  var locRate = p.win_rate_local != null ? Number(p.win_rate_local).toFixed(2) : '-';

  var row = document.createElement('div');
  row.className = 'player-row';

  var waku = document.createElement('div');
  waku.className = 'waku waku-' + p.lane;
  waku.textContent = p.lane;

  var pid = document.createElement('span');
  pid.className = 'player-id';
  pid.textContent = p.player_id;

  var nameEl = document.createElement('div');
  nameEl.className = 'player-name';
  nameEl.textContent = formatName(p.name);

  var gradeEl = document.createElement('span');
  gradeEl.className = 'player-grade ' + pgClass;
  gradeEl.textContent = p.grade;

  var statsEl = document.createElement('div');
  statsEl.className = 'player-stats';

  var stat1 = document.createElement('div');
  stat1.className = 'player-stat';
  var lbl1 = document.createElement('span');
  lbl1.className = 'player-stat-label';
  lbl1.textContent = '全国';
  var val1 = document.createElement('strong');
  val1.textContent = natRate;
  stat1.appendChild(lbl1);
  stat1.appendChild(val1);

  var stat2 = document.createElement('div');
  stat2.className = 'player-stat';
  var lbl2 = document.createElement('span');
  lbl2.className = 'player-stat-label';
  lbl2.textContent = '当地';
  var val2 = document.createElement('strong');
  val2.textContent = locRate;
  stat2.appendChild(lbl2);
  stat2.appendChild(val2);

  statsEl.appendChild(stat1);
  statsEl.appendChild(stat2);

  row.appendChild(waku);
  row.appendChild(pid);
  row.appendChild(nameEl);
  row.appendChild(gradeEl);
  row.appendChild(statsEl);

  return row;
}

function renderRaceCard(race) {
  var timeStr = race.scheduled_time || '--:--';
  var status = getRaceStatus(race.scheduled_time);

  var card = document.createElement('div');
  card.className = 'race-card';
  card.id = 'race-' + race.race_no;

  var hdr = document.createElement('div');
  hdr.className = 'race-header';

  var hdrLeft = document.createElement('div');
  hdrLeft.className = 'race-header-left';
  var noEl = document.createElement('span');
  noEl.className = 'race-no';
  noEl.textContent = race.race_no + 'R';
  var timeEl = document.createElement('span');
  timeEl.className = 'race-time';
  var timeLbl = document.createElement('span');
  timeLbl.className = 'race-time-label';
  timeLbl.textContent = '締切';
  timeEl.appendChild(timeLbl);
  timeEl.appendChild(document.createTextNode(timeStr));
  hdrLeft.appendChild(noEl);
  hdrLeft.appendChild(timeEl);

  var hdrRight = document.createElement('div');
  hdrRight.className = 'race-header-right';
  var badge = document.createElement('span');
  badge.className = 'status-badge ' + status.cls;
  badge.textContent = status.text;
  hdrRight.appendChild(badge);

  hdr.appendChild(hdrLeft);
  hdr.appendChild(hdrRight);

  var playerTable = document.createElement('div');
  playerTable.className = 'player-table';
  playerTable.id = 'players-' + race.race_no;
  var loadingDiv = document.createElement('div');
  loadingDiv.className = 'player-loading';
  loadingDiv.textContent = '選手データを読み込み中...';
  playerTable.appendChild(loadingDiv);

  var actions = document.createElement('div');
  actions.className = 'race-actions';

  var btnRacelist = document.createElement('a');
  btnRacelist.className = 'action-btn';
  btnRacelist.href = buildBoatraceUrl(race.race_no);
  btnRacelist.target = '_blank';
  btnRacelist.textContent = '出走表';

  var btnInfo = document.createElement('a');
  btnInfo.className = 'action-btn';
  btnInfo.href = buildPredictUrl(race.race_no);
  btnInfo.textContent = '直前情報';

  var btnPredict = document.createElement('a');
  btnPredict.className = 'action-btn primary';
  btnPredict.href = buildPredictUrl(race.race_no);
  btnPredict.textContent = 'AI予想';

  actions.appendChild(btnRacelist);
  actions.appendChild(btnInfo);
  actions.appendChild(btnPredict);

  card.appendChild(hdr);
  card.appendChild(playerTable);
  card.appendChild(actions);

  return card;
}

async function loadPlayerData(raceNo) {
  try {
    var url = buildApiUrl('predict.php', { date: date, venue: venue, race_no: raceNo });
    var res = await fetch(url);
    if (!res.ok) return;
    var data = await res.json();
    if (data.error || !data.predictions || data.predictions.length === 0) return;

    var el = document.getElementById('players-' + raceNo);
    if (!el) return;
    var sorted = data.predictions.slice().sort(function(a, b) { return a.lane - b.lane; });
    el.textContent = '';
    sorted.forEach(function(p) {
      el.appendChild(renderPlayerRow(p));
    });
  } catch(e) {}
}

async function loadRaces() {
  var list = document.getElementById('raceList');
  try {
    var url = buildApiUrl('races.php', { date: date, venue: venue });
    var res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var data = await res.json();

    if (!data.races || data.races.length === 0) {
      list.textContent = '';
      var errDiv = document.createElement('div');
      errDiv.className = 'error-msg';
      errDiv.textContent = 'レース情報が見つかりません';
      list.appendChild(errDiv);
      return;
    }

    var banner = document.getElementById('venueBanner');
    document.getElementById('bannerTitle').textContent = venue;
    document.getElementById('bannerSub').textContent = formatDateJP(date) + ' 開催';
    document.getElementById('bannerTotal').textContent = data.races.length + 'R';
    banner.style.display = 'flex';

    list.textContent = '';
    data.races.forEach(function(r) {
      list.appendChild(renderRaceCard(r));
    });

    var loadPromises = data.races.map(function(r) { return loadPlayerData(r.race_no); });
    await Promise.all(loadPromises);
  } catch(e) {
    list.textContent = '';
    var errDiv = document.createElement('div');
    errDiv.className = 'error-msg';
    errDiv.textContent = 'データの取得に失敗しました';
    list.appendChild(errDiv);
  }
}

loadRaces();
</script>
</body>
</html>
