<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>艇王 - レース一覧</title>
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/races.css">
</head>
<body>

<header>
  <a class="back" href="index.html">&larr;</a>
  <div class="header-title">
    <h1 id="pageTitle">レース一覧</h1>
    <small id="pageDate"></small>
  </div>
</header>

<div class="container">
  <div id="raceList">
    <div class="loading">
      <div class="loading-spinner"></div>
      レース情報を取得中...
    </div>
  </div>
</div>

<footer>艇王 &copy; 2026</footer>

<script>
const params = new URLSearchParams(location.search);
const venue = params.get('venue') || '';
const date  = params.get('date')  || today();

function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

const VENUE_GRADES = {
  '桐生':'G3','戸田':'一般','江戸川':'一般','平和島':'G1','多摩川':'一般',
  '浜名湖':'一般','蒲郡':'一般','常滑':'一般','津':'一般','三国':'一般',
  'びわこ':'一般','住之江':'G2','尼崎':'G3','鳴門':'一般','丸亀':'一般',
  '児島':'一般','宮島':'一般','徳山':'一般','下関':'SG','若松':'一般',
  '芦屋':'一般','福岡':'一般','唐津':'一般','大村':'一般'
};
const GRADE_CLASSES = { 'SG':'grade-sg','G1':'grade-g1','G2':'grade-g2','G3':'grade-g3','一般':'grade-ippan' };

document.getElementById('pageTitle').textContent = `${venue} レース一覧`;
document.getElementById('pageDate').textContent = date;
document.title = `艇王 - ${venue}`;

const API_BASE = 'https://2410049.moo.jp';

function formatName(name) {
  return name.replace(/\s+/g, ' ').trim();
}

function renderRaceCard(race, predictions) {
  const venueGrade = VENUE_GRADES[venue] || '一般';
  const gradeClass = GRADE_CLASSES[venueGrade];
  const timeStr = race.scheduled_time || '--:--';

  let playersHtml;
  if (predictions && predictions.length > 0) {
    const sorted = [...predictions].sort((a, b) => a.lane - b.lane);
    playersHtml = sorted.map(p => {
      const pgClass = `pg-${p.grade.replace(/\s/g, '')}`;
      return `
        <div class="player-row">
          <div class="waku waku-${p.lane}">${p.lane}</div>
          <div class="player-name">${formatName(p.name)}</div>
          <span class="player-grade ${pgClass}">${p.grade}</span>
          <div class="player-stat">勝率 <strong>${p.win_rate_national?.toFixed(2) ?? '-'}</strong></div>
        </div>`;
    }).join('');
  } else {
    playersHtml = '<div class="player-loading">選手データを取得中...</div>';
  }

  const boatraceUrl = `https://www.boatrace.jp/owpc/pc/race/racelist?hd=${date.replace(/-/g, '')}&jcd=&rno=${race.race_no}`;

  return `
    <div class="race-card" id="race-${race.race_no}">
      <div class="race-header">
        <div class="race-header-left">
          <span class="race-no">${race.race_no}R</span>
          <span class="race-time"><span class="race-time-label">締切</span>${timeStr}</span>
        </div>
        <span class="grade-badge ${gradeClass}">${venueGrade}</span>
      </div>
      <div class="player-list" id="players-${race.race_no}">
        ${playersHtml}
      </div>
      <div class="race-actions">
        <a class="action-btn" href="${boatraceUrl}" target="_blank">出走表</a>
        <a class="action-btn" href="predict.html?venue=${encodeURIComponent(venue)}&date=${date}&race_no=${race.race_no}">直前情報</a>
        <a class="action-btn primary" href="predict.html?venue=${encodeURIComponent(venue)}&date=${date}&race_no=${race.race_no}">AI予想</a>
      </div>
    </div>`;
}

async function loadPredictions(raceNo) {
  try {
    const res = await fetch(`${API_BASE}/predict.php?date=${date}&venue=${encodeURIComponent(venue)}&race_no=${raceNo}`);
    if (!res.ok) return null;
    const data = await res.json();
    if (data.error || !data.predictions) return null;
    return data.predictions;
  } catch {
    return null;
  }
}

async function loadRaces() {
  const list = document.getElementById('raceList');
  try {
    const res = await fetch(`${API_BASE}/races.php?date=${date}&venue=${encodeURIComponent(venue)}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    if (!data.races || data.races.length === 0) {
      list.innerHTML = '<div class="error-msg">レース情報が見つかりません</div>';
      return;
    }

    list.innerHTML = data.races.map(r => renderRaceCard(r, null)).join('');

    data.races.forEach(async (race) => {
      const predictions = await loadPredictions(race.race_no);
      if (predictions && predictions.length > 0) {
        const el = document.getElementById(`players-${race.race_no}`);
        if (!el) return;
        const sorted = [...predictions].sort((a, b) => a.lane - b.lane);
        el.innerHTML = sorted.map(p => {
          const pgClass = `pg-${p.grade.replace(/\s/g, '')}`;
          return `
            <div class="player-row">
              <div class="waku waku-${p.lane}">${p.lane}</div>
              <div class="player-name">${formatName(p.name)}</div>
              <span class="player-grade ${pgClass}">${p.grade}</span>
              <div class="player-stat">勝率 <strong>${p.win_rate_national?.toFixed(2) ?? '-'}</strong></div>
            </div>`;
        }).join('');
      }
    });
  } catch(e) {
    list.innerHTML = `<div class="error-msg">データの取得に失敗しました<br><small>${e.message}</small></div>`;
  }
}

loadRaces();
</script>
</body>
</html>
