<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>艇王 - 戦略別予想</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Hiragino Sans', 'Meiryo', sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }

header { background: #fff; border-bottom: 3px solid #0055a4; padding: 12px 20px; display: flex; align-items: center; gap: 14px; justify-content: space-between; }
.header-left { display: flex; align-items: center; gap: 12px; }
.back-btn { color: #0055a4; text-decoration: none; font-size: 20px; line-height: 1; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; transition: background 0.15s; }
.back-btn:hover { background: #e8f0fd; }
.header-info h1 { font-size: 17px; font-weight: 700; color: #222; }
.header-meta { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
.header-meta .date { font-size: 12px; color: #888; }
.grade-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 3px; }
.grade-sg { background: #fff3cd; color: #b8860b; }
.grade-g1 { background: #fee2e2; color: #c0392b; }
.grade-g2 { background: #dbeafe; color: #2563eb; }
.grade-g3 { background: #d1fae5; color: #16a34a; }
.grade-ippan { background: #f3f4f6; color: #888; }

.container { max-width: 800px; margin: 0 auto; padding: 20px 16px; }
footer { text-align: center; padding: 28px 16px; color: #bbb; font-size: 11px; }
.loading { text-align: center; padding: 60px 20px; color: #999; }
.loading-spinner { width: 32px; height: 32px; border: 3px solid #e0e3e8; border-top-color: #0055a4; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg { background: #fef2f2; border: 1px solid #fca5a5; border-radius: 10px; padding: 16px; color: #dc2626; font-size: 14px; }

.note-box { background: #f0f7ff; border: 1px solid #bfdbfe; border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; font-size: 12px; color: #1e40af; line-height: 1.6; }

/* ─── 統計グリッド ─────────────────────────────────── */
.period-tabs { display: flex; gap: 4px; margin-bottom: 16px; padding: 4px; background: #e9ecef; border-radius: 10px; }
.period-tab { flex: 1; padding: 8px 4px; border: none; border-radius: 8px; background: transparent; font-size: 13px; font-weight: 600; color: #888; cursor: pointer; text-align: center; transition: all 0.15s; }
.period-tab:hover { color: #555; background: #dde0e4; }
.period-tab.active { background: #1a56db; color: #fff; }

.strategy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.strategy-card { background: #fff; border: 1px solid #e0e3e8; border-radius: 12px; overflow: hidden; }
.strategy-card-bar { height: 4px; }
.strategy-card-body { padding: 14px 16px; }
.strategy-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.strategy-desc { font-size: 10px; color: #aaa; margin-bottom: 12px; }
.strategy-main-stats { display: flex; gap: 8px; margin-bottom: 12px; }
.stat-block { flex: 1; text-align: center; background: #f7f8fa; border-radius: 8px; padding: 8px 4px; }
.stat-block-label { font-size: 10px; color: #999; font-weight: 600; margin-bottom: 4px; }
.stat-block-value { font-size: 20px; font-weight: 800; line-height: 1.1; }
.stat-block-unit { font-size: 11px; color: #888; margin-top: 2px; }
.stat-positive { color: #16a34a; }
.stat-negative { color: #dc2626; }
.stat-neutral { color: #0055a4; }
.strategy-sub-stats { display: flex; flex-direction: column; gap: 5px; }
.sub-stat-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
.sub-stat-label { color: #888; }
.sub-stat-value { color: #333; font-weight: 600; font-variant-numeric: tabular-nums; }
.card-pending { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 160px; gap: 8px; }
.pending-type { font-size: 14px; font-weight: 700; color: #555; }
.pending-msg { font-size: 12px; color: #bbb; }

/* ─── 買い目セクション ─────────────────────────────── */
.combos-section { background: #fff; border: 1px solid #e0e3e8; border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
.combos-title { font-size: 14px; font-weight: 700; color: #222; padding: 14px 16px; border-bottom: 1px solid #e0e3e8; }
.combo-group { border-bottom: 1px solid #f0f0f0; }
.combo-group:last-child { border-bottom: none; }
.combo-group-hdr { display: flex; align-items: center; padding: 10px 16px; gap: 10px; cursor: pointer; transition: background 0.1s; }
.combo-group-hdr:hover { background: #fafbfc; }
.combo-group-bar { width: 4px; height: 20px; border-radius: 2px; flex-shrink: 0; }
.combo-group-name { font-size: 13px; font-weight: 700; flex: 1; }
.combo-group-meta { font-size: 11px; color: #888; }
.combo-group-chev { font-size: 10px; color: #bbb; margin-left: 4px; }
.combo-list { display: none; }
.combos-empty { padding: 24px 16px; text-align: center; color: #bbb; font-size: 13px; }

/* ─── 結果バナー ───────────────────────────────────── */
.result-banner { padding: 12px 16px 10px; border-bottom: 1px solid rgba(0,0,0,0.07); }
.banner-hit { background: #fff0f5; }
.banner-miss { background: #f5f5f5; }
.banner-pos-lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; margin-bottom: 6px; }
.banner-hit .banner-pos-lbl { color: #c2185b; }
.banner-miss .banner-pos-lbl { color: #999; }
.banner-main { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.banner-title { font-size: 20px; font-weight: 900; }
.banner-hit .banner-title { color: #e91e8c; }
.banner-miss .banner-title { color: #aaa; }
.banner-combo-row { display: flex; align-items: center; gap: 3px; }
.banner-payout-txt { font-size: 14px; font-weight: 700; color: #e91e8c; }
.banner-miss-combo { font-size: 12px; color: #aaa; margin-top: 4px; }

/* ─── フィルターバー ───────────────────────────────── */
.filter-bar { display: flex; gap: 8px; padding: 8px 12px; background: #f9fafb; border-bottom: 1px solid #ebebeb; flex-wrap: wrap; align-items: center; }
.filter-group { display: flex; align-items: center; gap: 3px; }
.filter-pos-lbl { font-size: 11px; font-weight: 700; color: #555; margin-right: 2px; white-space: nowrap; }
.filter-btn { width: 26px; height: 26px; border-radius: 4px; border: 1px solid #ddd; background: #f0f0f0; color: #888; font-size: 12px; font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; padding: 0; }
.filter-btn:hover { border-color: #aaa; }
.filter-divider { width: 1px; height: 20px; background: #e0e0e0; margin: 0 2px; }

/* ─── 買い目テーブル ───────────────────────────────── */
.ct-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.ct-table { min-width: 360px; width: 100%; }
.ct-hdr { display: flex; padding: 5px 16px; background: #f7f8fa; gap: 4px; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
.ct-row { display: flex; padding: 7px 16px; border-bottom: 1px solid #f5f5f5; gap: 4px; align-items: center; }
.ct-row:last-child { border-bottom: none; }
.ct-row.ct-hl { background: #fffbea; }
.ct-row.ct-hit { background: #fffde7; border-left: 3px solid #f59e0b; padding-left: 13px; }
.ct-col-combo  { flex: 1; min-width: 108px; display: flex; align-items: center; gap: 3px; }
.ct-col-odds   { width: 80px; text-align: right; flex-shrink: 0; }
.ct-col-cost   { width: 52px; text-align: right; flex-shrink: 0; }
.ct-col-payout { width: 76px; text-align: right; flex-shrink: 0; }
.ct-col-rate   { width: 54px; text-align: right; flex-shrink: 0; }
.ct-th { font-size: 10px; font-weight: 700; color: #999; }
.ct-sep { font-size: 11px; color: #bbb; }
.ct-waku { width: 22px; height: 22px; border-radius: 3px; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; flex-shrink: 0; }
.ct-odds-val { font-size: 13px; font-weight: 700; color: #0055a4; font-variant-numeric: tabular-nums; }
.ct-odds-val.ct-max { color: #d97706; }
.ct-odds-none { font-size: 13px; color: #bbb; }
.ct-icon { font-size: 12px; margin-left: 1px; }
.ct-cost-val { font-size: 12px; color: #aaa; }
.ct-payout-val { font-size: 12px; font-weight: 600; color: #333; font-variant-numeric: tabular-nums; }
.ct-rate-val { font-size: 12px; color: #6b7280; font-variant-numeric: tabular-nums; }
.ct-hit-mark { font-size: 14px; margin-right: 2px; }

/* ─── ボトムナビ ───────────────────────────────────── */
.bottom-actions { display: flex; gap: 6px; margin-top: 4px; }
.bottom-btn { flex: 1; padding: 10px; border: 1px solid #e0e3e8; border-radius: 10px; background: #fff; font-size: 13px; font-weight: 600; color: #555; text-align: center; text-decoration: none; transition: all 0.15s; }
.bottom-btn:hover { border-color: #0055a4; color: #0055a4; }

@media (max-width: 480px) {
  .strategy-grid { grid-template-columns: 1fr; }
  .stat-block-value { font-size: 18px; }
  .header-info h1 { font-size: 15px; }
  .ct-col-cost { display: none; }
  .filter-bar { gap: 6px; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <a class="back-btn" id="backBtn" href="index.html">&larr;</a>
    <div class="header-info">
      <h1 id="pageTitle">戦略別予想</h1>
      <div class="header-meta">
        <span class="date" id="pageDate"></span>
        <span class="grade-badge" id="pageBadge"></span>
      </div>
    </div>
  </div>
</header>

<div class="container">
  <div class="note-box">
    戦略ごとの買い目で過去レースを仮想購入した場合の実績です。1点100円換算。
  </div>

  <div class="period-tabs">
    <button class="period-tab active" data-period="week">今週</button>
    <button class="period-tab" data-period="month">今月</button>
    <button class="period-tab" data-period="all">全期間</button>
  </div>

  <div id="strategyArea">
    <div class="loading"><div class="loading-spinner"></div>集計データを取得中...</div>
  </div>

  <div id="combosSection" style="display:none"></div>

  <div class="bottom-actions" id="bottomActions" style="display:none">
    <a class="bottom-btn" id="btnRacelist">出走表</a>
    <a class="bottom-btn" id="btnPredict">直前情報</a>
    <a class="bottom-btn" id="btnAiPredict">予想</a>
  </div>
</div>

<footer>艇王 &copy; 2026</footer>

<script>
var params  = new URLSearchParams(location.search);
var venue   = params.get('venue')   || '';
var date    = params.get('date')    || todayStr();
var raceNo  = params.get('race_no') || '1';

var API_HOST = 'https://' + '2410049.moo.jp';
var currentPeriod = 'week';

var STRAT_DEFS = [
  { type: '的中特化', color: '#2563eb', desc: '上位3艇の全順列（最大6点）' },
  { type: 'バランス',   color: '#16a34a', desc: '上位2艇固定×上位4艇流し（最大12点）' },
  { type: '一撃重視', color: '#dc2626', desc: '1位固定・穴狙い（最大6点）' },
  { type: '絞り込み', color: '#7c3aed', desc: '1点勝負' }
];

var VENUE_GRADES = { '桐生':'G3','戸田':'一般','江戸川':'一般','平和島':'G1','多摩川':'一般','浜名湖':'一般','蒲郡':'一般','常滑':'一般','津':'一般','三国':'一般','琵琶湖':'一般','住之江':'G2','尼崎':'G3','鳴門':'一般','高松':'一般','丸亀':'一般','児島':'一般','宮島':'一般','徳山':'一般','下関':'SG','若松':'一般','芦屋':'一般','福岡':'一般','唐津':'一般','大村':'一般' };
var GRADE_CLASSES = { 'SG':'grade-sg','G1':'grade-g1','G2':'grade-g2','G3':'grade-g3','一般':'grade-ippan' };

var WAKU_STYLES = {
  1: 'background:#fff;color:#222;border:2px solid #ccc',
  2: 'background:#222;color:#fff',
  3: 'background:#e53e3e;color:#fff',
  4: 'background:#2563eb;color:#fff',
  5: 'background:#eab308;color:#222',
  6: 'background:#16a34a;color:#fff'
};

function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
}
function pad2(n) { return n < 10 ? '0' + n : '' + n; }
function fmtDate(ds) {
  var d = new Date(ds + 'T00:00:00');
  var w = ['日','月','火','水','木','金','土'];
  return (d.getMonth() + 1) + '/' + d.getDate() + ' (' + w[d.getDay()] + ')';
}

// ─── ヘッダー設定 ──────────────────────────────────────
var vg = VENUE_GRADES[venue] || '一般';
document.getElementById('pageTitle').textContent = (venue ? venue + ' ' + raceNo + 'R ' : '') + '戦略別予想';
document.title = '艇王 - ' + (venue ? venue + ' ' : '') + '戦略別予想';
var badge = document.getElementById('pageBadge');
badge.textContent = vg;
badge.className = 'grade-badge ' + (GRADE_CLASSES[vg] || 'grade-ippan');
document.getElementById('pageDate').textContent = fmtDate(date);

var baseQ = 'venue=' + encodeURIComponent(venue) + '&date=' + date + '&race_no=' + raceNo;
document.getElementById('backBtn').href = 'races.html?venue=' + encodeURIComponent(venue) + '&date=' + date;
document.getElementById('btnRacelist').href  = 'racelist.html?'  + baseQ;
document.getElementById('btnPredict').href   = 'predict.html?'   + baseQ;
document.getElementById('btnAiPredict').href = 'ai-predict.html?' + baseQ;
document.getElementById('bottomActions').style.display = 'flex';

// ─── 期間計算 ───────────────────────────────────────────
function getPeriodDates(period) {
  var now = new Date();
  var todayS = todayStr();
  if (period === 'week') {
    var dow = now.getDay() || 7;
    var mon = new Date(now);
    mon.setDate(now.getDate() - dow + 1);
    return { start: mon.getFullYear() + '-' + pad2(mon.getMonth() + 1) + '-' + pad2(mon.getDate()), end: todayS };
  }
  if (period === 'month') {
    return { start: now.getFullYear() + '-' + pad2(now.getMonth() + 1) + '-01', end: todayS };
  }
  return { start: null, end: null };
}

// ─── 統計カードレンダリング ──────────────────────────────
function makeStatBlock(label, value, unit, colorClass) {
  var block = document.createElement('div');
  block.className = 'stat-block';
  var lbl = document.createElement('div'); lbl.className = 'stat-block-label'; lbl.textContent = label;
  var val = document.createElement('div'); val.className = 'stat-block-value ' + colorClass; val.textContent = value;
  var u   = document.createElement('div'); u.className   = 'stat-block-unit';  u.textContent   = unit;
  block.appendChild(lbl); block.appendChild(val); block.appendChild(u);
  return block;
}

function addSubRow(parent, label, value) {
  var row = document.createElement('div'); row.className = 'sub-stat-row';
  var lbl = document.createElement('span'); lbl.className = 'sub-stat-label'; lbl.textContent = label;
  var val = document.createElement('span'); val.className = 'sub-stat-value'; val.textContent = value;
  row.appendChild(lbl); row.appendChild(val); parent.appendChild(row);
}

function renderCard(def, stat) {
  var card = document.createElement('div');
  card.className = 'strategy-card';
  var colorBar = document.createElement('div');
  colorBar.className = 'strategy-card-bar'; colorBar.style.background = def.color;
  card.appendChild(colorBar);

  var body = document.createElement('div');
  body.className = 'strategy-card-body';

  if (!stat || !stat.total_races) {
    var pending = document.createElement('div'); pending.className = 'card-pending';
    var icon = document.createElement('div'); icon.style.cssText = 'font-size:28px'; icon.textContent = '⏳';
    var nm   = document.createElement('div'); nm.className = 'pending-type'; nm.style.color = def.color; nm.textContent = def.type;
    var msg  = document.createElement('div'); msg.className = 'pending-msg'; msg.textContent = '集計中';
    pending.appendChild(icon); pending.appendChild(nm); pending.appendChild(msg);
    body.appendChild(pending); card.appendChild(body);
    return card;
  }

  var nm   = document.createElement('div'); nm.className = 'strategy-name'; nm.style.color = def.color; nm.textContent = def.type;
  var desc = document.createElement('div'); desc.className = 'strategy-desc'; desc.textContent = def.desc;
  var mainStats = document.createElement('div'); mainStats.className = 'strategy-main-stats';

  var hitRate = Number(stat.hit_rate);
  var roi     = Number(stat.roi);
  var hitColor = hitRate >= 20 ? 'stat-positive' : hitRate >= 10 ? 'stat-neutral' : 'stat-negative';
  var roiColor = roi >= 0 ? 'stat-positive' : 'stat-negative';
  var roiStr   = roi >= 0 ? '+' + roi.toFixed(1) : roi.toFixed(1);

  mainStats.appendChild(makeStatBlock('的中率', hitRate.toFixed(1), '%', hitColor));
  mainStats.appendChild(makeStatBlock('回収率', roiStr, '%', roiColor));

  var subStats = document.createElement('div'); subStats.className = 'strategy-sub-stats';
  var avgCombos = stat.total_races > 0 ? (stat.total_cost / 100 / stat.total_races) : 0;
  var profitStr = (stat.profit >= 0 ? '+' : '') + Number(stat.profit).toLocaleString() + '円';

  addSubRow(subStats, '的中 / 総数', stat.hits + '回 / ' + stat.total_races + 'レース');
  addSubRow(subStats, '平均購入点数', avgCombos.toFixed(1) + '点');
  addSubRow(subStats, '損益', profitStr);

  body.appendChild(nm); body.appendChild(desc); body.appendChild(mainStats); body.appendChild(subStats);
  card.appendChild(body);
  return card;
}

function renderGrid(statsMap) {
  var area = document.getElementById('strategyArea');
  area.textContent = '';
  var grid = document.createElement('div'); grid.className = 'strategy-grid';
  for (var i = 0; i < STRAT_DEFS.length; i++) {
    grid.appendChild(renderCard(STRAT_DEFS[i], statsMap[STRAT_DEFS[i].type] || null));
  }
  area.appendChild(grid);
}

// ─── 統計データ取得 ──────────────────────────────────────
async function loadStats(period) {
  var area = document.getElementById('strategyArea');
  area.textContent = '';
  var spinner = document.createElement('div'); spinner.className = 'loading';
  var s = document.createElement('div'); s.className = 'loading-spinner';
  spinner.appendChild(s);
  spinner.appendChild(document.createTextNode('集計データを取得中...'));
  area.appendChild(spinner);

  var dates = getPeriodDates(period);
  var url = API_HOST + '/strategy_stats.php';
  if (dates.start) { url += '?start_date=' + dates.start + '&end_date=' + dates.end; }

  try {
    var res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var data = await res.json();
    if (data.error) throw new Error(data.error);
    var statsMap = {};
    var rows = data.stats || [];
    for (var i = 0; i < rows.length; i++) { statsMap[rows[i].strategy_type] = rows[i]; }
    renderGrid(statsMap);
  } catch(e) {
    area.textContent = '';
    var err = document.createElement('div'); err.className = 'error-msg';
    err.textContent = 'データの取得に失敗しました'; area.appendChild(err);
  }
}

// ─── タブ切り替え ──────────────────────────────────────
var tabBtns = document.querySelectorAll('.period-tab');
for (var ti = 0; ti < tabBtns.length; ti++) {
  (function(btn) {
    btn.addEventListener('click', function() {
      for (var j = 0; j < tabBtns.length; j++) { tabBtns[j].className = 'period-tab'; }
      btn.className = 'period-tab active';
      currentPeriod = btn.getAttribute('data-period');
      loadStats(currentPeriod);
    });
  })(tabBtns[ti]);
}

// ─── 枠バッジ ──────────────────────────────────────────
function makeWakuBadge(lane) {
  var el = document.createElement('span');
  el.className = 'ct-waku';
  el.style.cssText = WAKU_STYLES[lane] || 'background:#eee;color:#333';
  el.textContent = lane;
  return el;
}

function makeTh(cls, text) {
  var el = document.createElement('div');
  el.className = cls + ' ct-th';
  el.textContent = text;
  return el;
}

// ─── 結果バナー ────────────────────────────────────────
function makeBanner(stratIsHit, hitCombo, hitOdds, hitPayout) {
  var banner = document.createElement('div');
  banner.className = 'result-banner ' + (stratIsHit ? 'banner-hit' : 'banner-miss');

  if (stratIsHit && hitCombo) {
    var posLbl = document.createElement('div'); posLbl.className = 'banner-pos-lbl';
    posLbl.textContent = '的中！';
    banner.appendChild(posLbl);

    var main = document.createElement('div'); main.className = 'banner-main';

    var titleEl = document.createElement('div'); titleEl.className = 'banner-title';
    titleEl.textContent = '的中';
    main.appendChild(titleEl);

    var comboRow = document.createElement('div'); comboRow.className = 'banner-combo-row';
    var parts = hitCombo.split('-');
    for (var j = 0; j < parts.length; j++) {
      comboRow.appendChild(makeWakuBadge(Number(parts[j])));
      if (j < parts.length - 1) {
        var sep = document.createElement('span'); sep.className = 'ct-sep'; sep.textContent = '-';
        comboRow.appendChild(sep);
      }
    }
    main.appendChild(comboRow);

    if (hitOdds !== null && hitOdds !== undefined) {
      var oddsEl = document.createElement('div'); oddsEl.className = 'banner-payout-txt';
      oddsEl.textContent = Number(hitOdds).toFixed(1) + '倍';
      main.appendChild(oddsEl);
    }
    if (hitPayout !== null && hitPayout !== undefined) {
      var payEl = document.createElement('div'); payEl.className = 'banner-payout-txt';
      payEl.textContent = '▶ ' + Number(hitPayout).toLocaleString() + '円';
      main.appendChild(payEl);
    }
    banner.appendChild(main);
  } else {
    var posLbl2 = document.createElement('div'); posLbl2.className = 'banner-pos-lbl';
    posLbl2.textContent = '今回の結果';
    banner.appendChild(posLbl2);

    var main2 = document.createElement('div'); main2.className = 'banner-main';
    var titleEl2 = document.createElement('div'); titleEl2.className = 'banner-title';
    titleEl2.textContent = '不的中';
    main2.appendChild(titleEl2);

    if (hitCombo) {
      var winRow = document.createElement('div'); winRow.className = 'banner-combo-row';
      var parts2 = hitCombo.split('-');
      for (var k = 0; k < parts2.length; k++) {
        winRow.appendChild(makeWakuBadge(Number(parts2[k])));
        if (k < parts2.length - 1) {
          var sep2 = document.createElement('span'); sep2.className = 'ct-sep'; sep2.textContent = '-';
          winRow.appendChild(sep2);
        }
      }
      main2.appendChild(winRow);
      if (hitPayout !== null && hitPayout !== undefined) {
        var payEl2 = document.createElement('div'); payEl2.className = 'ct-odds-none';
        payEl2.style.cssText = 'font-size:12px;margin-left:4px';
        payEl2.textContent = Number(hitPayout).toLocaleString() + '円';
        main2.appendChild(payEl2);
      }
    }
    banner.appendChild(main2);
  }

  return banner;
}

// ─── フィルターバー ────────────────────────────────────
function makeFilterBar(combosArr, rowEls) {
  var bar = document.createElement('div'); bar.className = 'filter-bar';

  var selected = [[], [], []];

  var POS_LABELS = ['1着🔴', '2着⚪', '3着🔵'];

  function applyFilter() {
    for (var ri = 0; ri < rowEls.length; ri++) {
      var parts = combosArr[ri].split('-');
      var show = true;
      for (var pi = 0; pi < 3; pi++) {
        if (selected[pi].length > 0) {
          var laneNum = parseInt(parts[pi], 10);
          var found = false;
          for (var si = 0; si < selected[pi].length; si++) {
            if (selected[pi][si] === laneNum) { found = true; break; }
          }
          if (!found) { show = false; break; }
        }
      }
      rowEls[ri].style.display = show ? '' : 'none';
    }
  }

  for (var pi = 0; pi < 3; pi++) {
    (function(posIdx) {
      if (posIdx > 0) {
        var div = document.createElement('div'); div.className = 'filter-divider';
        bar.appendChild(div);
      }
      var group = document.createElement('div'); group.className = 'filter-group';
      var lbl = document.createElement('span'); lbl.className = 'filter-pos-lbl';
      lbl.textContent = POS_LABELS[posIdx];
      group.appendChild(lbl);

      for (var lane = 1; lane <= 6; lane++) {
        (function(laneNum) {
          var btn = document.createElement('button');
          btn.className = 'filter-btn';
          btn.textContent = laneNum;

          btn.onclick = function() {
            var idx = -1;
            for (var si = 0; si < selected[posIdx].length; si++) {
              if (selected[posIdx][si] === laneNum) { idx = si; break; }
            }
            if (idx >= 0) {
              selected[posIdx].splice(idx, 1);
              btn.style.cssText = '';
              btn.className = 'filter-btn';
            } else {
              selected[posIdx].push(laneNum);
              btn.style.cssText = WAKU_STYLES[laneNum] || '';
              btn.className = 'filter-btn active';
            }
            applyFilter();
          };

          group.appendChild(btn);
        })(lane);
      }

      bar.appendChild(group);
    })(pi);
  }

  return bar;
}

// ─── 買い目テーブル行 ──────────────────────────────────
function makeComboRow(item, maxOdds, isFinished) {
  var parts  = item.combo.split('-');
  var isMax  = maxOdds !== null && item.odds !== null && item.odds === maxOdds;
  var isHit  = isFinished && item.is_hit;

  var rowClass = 'ct-row';
  if (isHit)      { rowClass += ' ct-hit'; }
  else if (isMax) { rowClass += ' ct-hl'; }

  var row = document.createElement('div'); row.className = rowClass;

  // 3連単セル
  var comboCell = document.createElement('div'); comboCell.className = 'ct-col-combo';
  if (isHit) {
    var mark = document.createElement('span'); mark.className = 'ct-hit-mark'; mark.textContent = '⭐';
    comboCell.appendChild(mark);
  }
  for (var j = 0; j < parts.length; j++) {
    comboCell.appendChild(makeWakuBadge(Number(parts[j])));
    if (j < parts.length - 1) {
      var sep = document.createElement('span'); sep.className = 'ct-sep'; sep.textContent = '-';
      comboCell.appendChild(sep);
    }
  }

  // オッズセル
  var oddsCell = document.createElement('div'); oddsCell.className = 'ct-col-odds';
  if (item.odds !== null) {
    var oddsVal = document.createElement('span');
    oddsVal.className = 'ct-odds-val' + (isMax && !isHit ? ' ct-max' : '');
    oddsVal.textContent = Number(item.odds).toFixed(1) + '倍';
    oddsCell.appendChild(oddsVal);
    if (isMax && !isHit) {
      var icon = document.createElement('span'); icon.className = 'ct-icon'; icon.textContent = '⭐';
      oddsCell.appendChild(icon);
    }
  } else {
    var oddsNone = document.createElement('span'); oddsNone.className = 'ct-odds-none'; oddsNone.textContent = '-';
    oddsCell.appendChild(oddsNone);
  }

  // 購入金額セル
  var costCell = document.createElement('div'); costCell.className = 'ct-col-cost';
  var costVal = document.createElement('span'); costVal.className = 'ct-cost-val'; costVal.textContent = '100円';
  costCell.appendChild(costVal);

  // 払戻セル
  var payoutCell = document.createElement('div'); payoutCell.className = 'ct-col-payout';
  if (item.odds !== null) {
    var payoutVal = document.createElement('span'); payoutVal.className = 'ct-payout-val';
    payoutVal.textContent = Math.floor(item.odds * 100).toLocaleString() + '円';
    payoutCell.appendChild(payoutVal);
  } else {
    var payoutNone = document.createElement('span'); payoutNone.className = 'ct-odds-none'; payoutNone.textContent = '-';
    payoutCell.appendChild(payoutNone);
  }

  // 的中率セル
  var rateCell = document.createElement('div'); rateCell.className = 'ct-col-rate';
  if (item.odds !== null && item.odds > 0) {
    var rateVal = document.createElement('span'); rateVal.className = 'ct-rate-val';
    var pct = 100 / item.odds;
    rateVal.textContent = pct < 1 ? pct.toFixed(2) + '%' : pct.toFixed(1) + '%';
    rateCell.appendChild(rateVal);
  } else {
    var rateNone = document.createElement('span'); rateNone.className = 'ct-odds-none'; rateNone.textContent = '-';
    rateCell.appendChild(rateNone);
  }

  row.appendChild(comboCell); row.appendChild(oddsCell); row.appendChild(costCell);
  row.appendChild(payoutCell); row.appendChild(rateCell);
  return row;
}

// ─── 戦略グループレンダリング ──────────────────────────
function renderComboGroup(strat, def, ctx) {
  var isFinished     = ctx ? ctx.isFinished     : false;
  var hitCombination = ctx ? ctx.hitCombination : null;
  var hitOdds        = ctx ? ctx.hitOdds        : null;
  var hitPayout      = ctx ? ctx.hitPayout      : null;

  var group = document.createElement('div'); group.className = 'combo-group';

  // ヘッダー
  var hdr = document.createElement('div'); hdr.className = 'combo-group-hdr';
  var bar = document.createElement('div'); bar.className = 'combo-group-bar';
  bar.style.background = def ? def.color : '#888';
  var nm = document.createElement('div'); nm.className = 'combo-group-name';
  nm.style.color = def ? def.color : '#222'; nm.textContent = strat.strategy_type;
  var meta = document.createElement('div'); meta.className = 'combo-group-meta';
  meta.textContent = strat.combo_count + '点  合計' + strat.total_cost.toLocaleString() + '円';
  var chev = document.createElement('div'); chev.className = 'combo-group-chev';
  chev.textContent = '▲';
  hdr.appendChild(bar); hdr.appendChild(nm); hdr.appendChild(meta); hdr.appendChild(chev);

  // コンテンツエリア（デフォルト展開）
  var list = document.createElement('div'); list.className = 'combo-list'; list.style.display = 'block';

  // 結果バナー
  if (isFinished) {
    list.appendChild(makeBanner(strat.is_hit, hitCombination, hitOdds, hitPayout));
  }

  // 行を先に生成してフィルターに渡す
  var maxOdds = null;
  for (var i = 0; i < strat.combinations.length; i++) {
    var o = strat.combinations[i].odds;
    if (o !== null && (maxOdds === null || o > maxOdds)) { maxOdds = o; }
  }

  var rowEls    = [];
  var combosArr = [];
  for (var i = 0; i < strat.combinations.length; i++) {
    var row = makeComboRow(strat.combinations[i], maxOdds, isFinished);
    rowEls.push(row);
    combosArr.push(strat.combinations[i].combo);
  }

  // フィルターバー
  list.appendChild(makeFilterBar(combosArr, rowEls));

  // テーブル
  var wrap = document.createElement('div'); wrap.className = 'ct-wrap';
  var table = document.createElement('div'); table.className = 'ct-table';

  var thdr = document.createElement('div'); thdr.className = 'ct-hdr';
  thdr.appendChild(makeTh('ct-col-combo', '3連単'));
  thdr.appendChild(makeTh('ct-col-odds',  'オッズ'));
  thdr.appendChild(makeTh('ct-col-cost',  '購入'));
  thdr.appendChild(makeTh('ct-col-payout','払戻'));
  thdr.appendChild(makeTh('ct-col-rate',  '的中率'));
  table.appendChild(thdr);

  for (var i = 0; i < rowEls.length; i++) { table.appendChild(rowEls[i]); }
  wrap.appendChild(table);
  list.appendChild(wrap);

  var expanded = true;
  hdr.onclick = function() {
    if (expanded) {
      list.style.display = 'none'; chev.textContent = '▼'; expanded = false;
    } else {
      list.style.display = 'block'; chev.textContent = '▲'; expanded = true;
    }
  };

  group.appendChild(hdr); group.appendChild(list);
  return group;
}

// ─── 買い目セクション全体 ─────────────────────────────
function renderCombosSection(strategies, ctx) {
  var sec = document.getElementById('combosSection');
  sec.textContent = ''; sec.style.display = '';
  var box = document.createElement('div'); box.className = 'combos-section';
  var title = document.createElement('div'); title.className = 'combos-title';
  title.textContent = '今レースの買い目';
  box.appendChild(title);

  if (!strategies || !strategies.length) {
    var empty = document.createElement('div'); empty.className = 'combos-empty';
    empty.textContent = 'まだ買い目が生成されていません（予想を開くと生成されます）';
    box.appendChild(empty);
  } else {
    var defMap = {};
    for (var i = 0; i < STRAT_DEFS.length; i++) { defMap[STRAT_DEFS[i].type] = STRAT_DEFS[i]; }
    for (var i = 0; i < strategies.length; i++) {
      box.appendChild(renderComboGroup(strategies[i], defMap[strategies[i].strategy_type] || null, ctx));
    }
  }
  sec.appendChild(box);
}

// ─── API取得 ──────────────────────────────────────────
async function loadRaceCombos() {
  if (!venue || !raceNo) return;
  var url = API_HOST + '/strategy_detail.php?venue=' + encodeURIComponent(venue) + '&date=' + date + '&race_no=' + raceNo;
  try {
    var res = await fetch(url);
    if (!res.ok) return;
    var data = await res.json();
    var ctx = {
      isFinished:     data.is_finished     || false,
      hitCombination: data.hit_combination || null,
      hitOdds:        data.hit_odds        || null,
      hitPayout:      data.hit_payout      || null,
    };
    renderCombosSection(data.strategies || [], ctx);
  } catch(e) {}
}

loadStats(currentPeriod);
if (venue && raceNo) { loadRaceCombos(); }
</script>
