<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>プラン変更 - 艇王</title>
<script src="common-header.js"></script>
<script src="plan-features.js"></script>
<style>
.upgrade-wrapper { max-width: 960px; margin: 40px auto; padding: 0 20px; }
.btn-back { display: inline-flex; align-items: center; gap: 8px; color: #0055a4; text-decoration: none; font-size: 13px; font-weight: bold; margin-bottom: 20px; }
.btn-back:hover { text-decoration: underline; }
.upgrade-title { font-size: 20px; font-weight: 800; color: #1a202c; text-align: center; margin-bottom: 8px; }
.upgrade-sub { font-size: 13px; color: #718096; text-align: center; margin-bottom: 28px; }
.plan-cards { display: flex; gap: 16px; }
.plan-card { flex: 1; background: #fff; border: 2px solid #e2e8f0; border-radius: 12px; padding: 28px 20px; transition: border-color 0.15s; position: relative; }
.plan-card:hover { border-color: #0055a4; }
.plan-card.active { border-color: #0055a4; border-width: 3px; }
.plan-current-badge { display: none; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: #0055a4; color: #fff; font-size: 11px; font-weight: 700; padding: 3px 12px; border-radius: 10px; white-space: nowrap; }
.plan-card.active .plan-current-badge { display: block; }
.plan-card h3 { font-size: 20px; font-weight: 800; color: #1a202c; margin-bottom: 4px; text-align: center; }
.plan-price { font-size: 28px; font-weight: 800; color: #0055a4; text-align: center; margin-bottom: 4px; }
.plan-price-sub { font-size: 12px; color: #a0aec0; text-align: center; margin-bottom: 16px; }
.plan-card ul { list-style: none; padding: 0; margin: 0 0 20px 0; }
.plan-card ul li { font-size: 13px; color: #4a5568; padding: 5px 0; }
.plan-card ul li.ok:before { content: "✅ "; }
.plan-card ul li.ng { color: #a0aec0; }
.plan-card ul li.ng:before { content: "❌ "; }
.plan-btn { width: 100%; padding: 11px; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
.plan-btn-free { background: #edf2f7; color: #4a5568; }
.plan-btn-standard { background: #0055a4; color: #fff; }
.plan-btn-standard:hover { background: #003d7a; }
.plan-btn-premium { background: #dd6b20; color: #fff; }
.plan-btn-premium:hover { background: #c05621; }
.plan-btn:disabled { background: #e2e8f0; color: #a0aec0; cursor: default; }
.plan-btn:disabled:hover { background: #e2e8f0; }
@media (max-width: 700px) {
  .upgrade-wrapper { margin: 20px auto; }
  .plan-cards { flex-direction: column; }
  .plan-card { padding: 22px 18px; }
}
</style>
</head>
<body>

<div class="upgrade-wrapper">
  <a href="mypage.php" class="btn-back">&larr; マイページに戻る</a>

  <div class="upgrade-title">プランを選択</div>
  <div class="upgrade-sub">あなたに合ったプランをお選びください</div>

  <div class="plan-cards">
    <div class="plan-card" id="cardFree">
      <div class="plan-current-badge">現在のプラン</div>
      <h3>Free</h3>
      <div class="plan-price">&yen;0</div>
      <div class="plan-price-sub">/ 月</div>
      <ul id="featuresFree"></ul>
      <button class="plan-btn plan-btn-free" id="btnFree" disabled>現在のプラン</button>
    </div>

    <div class="plan-card" id="cardStandard">
      <div class="plan-current-badge">現在のプラン</div>
      <h3>Standard</h3>
      <div class="plan-price">&yen;980</div>
      <div class="plan-price-sub">/ 月</div>
      <ul id="featuresStandard"></ul>
      <button class="plan-btn plan-btn-standard" id="btnStandard" onclick="changePlan('standard')">Standardに変更</button>
    </div>

    <div class="plan-card" id="cardPremium">
      <div class="plan-current-badge">現在のプラン</div>
      <h3>Premium</h3>
      <div class="plan-price">&yen;2,980</div>
      <div class="plan-price-sub">/ 月</div>
      <ul id="featuresPremium"></ul>
      <button class="plan-btn plan-btn-premium" id="btnPremium" onclick="changePlan('premium')">Premiumに変更</button>
    </div>
  </div>
</div>

<footer>艇王 &copy; 2026</footer>

<script>
var currentUserPlan = 'free';

// プラン特典リストはplan-features.js(mypage.php・upgrade.htmlの共通データ)から描画する
function renderPlanFeatures(ulId, tierKey) {
  var ul = document.getElementById(ulId);
  if (!ul) return;
  ul.textContent = '';
  PLAN_FEATURES.forEach(function(f) {
    var val = f.tiers[tierKey];
    var li = document.createElement('li');
    if (val === false) {
      li.className = 'ng';
      li.textContent = f.label;
    } else if (typeof val === 'string') {
      li.className = 'ok';
      li.textContent = f.label + ' (' + val + ')';
    } else {
      li.className = 'ok';
      li.textContent = f.label;
    }
    ul.appendChild(li);
  });
}
renderPlanFeatures('featuresFree', 'free');
renderPlanFeatures('featuresStandard', 'standard');
renderPlanFeatures('featuresPremium', 'premium');

async function loadCurrentPlan() {
  try {
    var res = await fetch('me.php');
    if (!res.ok) {
      location.href = 'login.html';
      return;
    }
    var data = await res.json();
    currentUserPlan = data.user.plan || 'free';
  } catch(e) {}

  var cards = { free: 'cardFree', standard: 'cardStandard', premium: 'cardPremium' };
  var btns = { free: 'btnFree', standard: 'btnStandard', premium: 'btnPremium' };
  var cardId = cards[currentUserPlan];
  if (cardId) {
    document.getElementById(cardId).className = 'plan-card active';
  }
  var btnId = btns[currentUserPlan];
  if (btnId) {
    var btn = document.getElementById(btnId);
    btn.disabled = true;
    btn.textContent = '現在のプラン';
  }
  var btnFree = document.getElementById('btnFree');
  if (currentUserPlan === 'free') {
    btnFree.style.display = '';
  } else {
    btnFree.style.display = 'none';
  }
}

async function changePlan(plan) {
  var labels = { standard: 'Standard', premium: 'Premium' };
  try {
    var res = await fetch('update_plan.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ plan: plan })
    });
    var data = await res.json();
    if (data.success) {
      alert('プランを' + labels[plan] + 'に変更しました！');
      location.reload();
    } else {
      alert('エラー: ' + (data.error || '変更に失敗しました'));
    }
  } catch(e) {
    alert('通信エラーが発生しました');
  }
}

loadCurrentPlan();
</script>
</body>
</html>
