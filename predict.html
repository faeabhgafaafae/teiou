<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>艇王 - 直前情報</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Hiragino Sans', 'Meiryo', sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }

.pred-header { background: #fff; border-bottom: 3px solid #0055a4; padding: 12px 20px; display: flex; align-items: center; gap: 14px; }
.back-btn { color: #0055a4; text-decoration: none; font-size: 20px; line-height: 1; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; transition: background 0.15s; }
.back-btn:hover { background: #e8f0fd; }
.pred-header h1 { font-size: 17px; font-weight: 700; color: #222; }

.container { max-width: 900px; margin: 0 auto; padding: 16px; }
footer { text-align: center; padding: 28px 16px; color: #bbb; font-size: 11px; }

.weather-info { display: flex; gap: 16px; font-size: 13px; color: #555; margin-bottom: 12px; padding: 8px 12px; background: #fff; border: 1px solid #e0e3e8; border-radius: 8px; }
.weather-info span { display: flex; align-items: center; gap: 4px; }
.weather-info strong { color: #222; }

.pred-table-wrap { overflow-x: auto; }
.pred-table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e0e3e8; border-radius: 8px; overflow: hidden; font-size: 13px; }
.pred-table th { background: #f7f8fa; font-size: 11px; font-weight: 700; color: #888; padding: 8px 6px; text-align: center; border-bottom: 2px solid #e0e3e8; white-space: nowrap; }
.pred-table td { padding: 8px 6px; text-align: center; border-bottom: 1px solid #f0f0f0; }
.pred-table tr:last-child td { border-bottom: none; }
.pred-table tr:hover { background: #fafbfc; }

.td-name { text-align: left; white-space: nowrap; }
.td-name-inner { font-weight: 600; color: #222; }
.td-grade { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-left: 6px; }
.pg-A1 { background: #fff3cd; color: #b8860b; }
.pg-A2 { background: #dbeafe; color: #2563eb; }
.pg-B1 { background: #f3f4f6; color: #666; }
.pg-B2 { background: #f3f4f6; color: #aaa; }

.waku { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 4px; font-weight: 800; font-size: 13px; }
.waku-1 { background: #fff; color: #222; border: 2px solid #ccc; }
.waku-2 { background: #222; color: #fff; }
.waku-3 { background: #e53e3e; color: #fff; }
.waku-4 { background: #2563eb; color: #fff; }
.waku-5 { background: #eab308; color: #222; }
.waku-6 { background: #16a34a; color: #fff; }

.score-total { font-size: 15px; font-weight: 700; color: #0055a4; }
.score-cell { font-variant-numeric: tabular-nums; }

.loading { text-align: center; padding: 40px; color: #999; font-size: 14px; }
.error-msg { background: #fef2f2; border: 1px solid #fca5a5; border-radius: 8px; padding: 16px; color: #dc2626; font-size: 14px; }

@media (max-width: 600px) {
  .pred-table { font-size: 12px; }
  .pred-table th, .pred-table td { padding: 6px 4px; }
  .waku { width: 22px; height: 22px; font-size: 11px; }
}
</style>
<script src="venue-display.js"></script>
</head>
<body>

<div class="pred-header">
  <a id="backLink" class="back-btn" href="index.php">&larr;</a>
  <h1 id="pageTitle">直前情報</h1>
</div>

<div class="container">
  <div id="weatherWrap" class="weather-info" style="display:none">
    <span>&#127788;&#65039; 風速 <strong id="windSpeed">-</strong>m</span>
    <span>&#127754; 波高 <strong id="waveHeight">-</strong>cm</span>
  </div>

  <div id="predArea">
    <div class="loading">直前情報を取得中...</div>
  </div>
</div>

<footer>艇王 &copy; 2026</footer>

<script>
var params = new URLSearchParams(location.search);
var venue = params.get('venue') || '';
var date = params.get('date') || todayStr();
var raceNo = params.get('race_no') || '1';

function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

document.getElementById('pageTitle').textContent = venueDisplayName(venue) + ' ' + raceNo + 'R 直前情報';
document.getElementById('backLink').href = 'races.html?venue=' + encodeURIComponent(venue) + '&date=' + date;
document.title = '艇王 - ' + venueDisplayName(venue) + ' ' + raceNo + 'R 直前情報';

var API_BASE = 'https://' + '2410049.moo.jp';

function formatName(n) { return n.replace(/[\s　]+/g, ''); }

function fmtVal(v, decimals) {
  if (v == null || v === '') return '-';
  return Number(v).toFixed(decimals);
}

function buildTable(predictions) {
  var area = document.getElementById('predArea');
  area.textContent = '';

  var wrap = document.createElement('div');
  wrap.className = 'pred-table-wrap';
  var table = document.createElement('table');
  table.className = 'pred-table';

  var thead = document.createElement('thead');
  var htr = document.createElement('tr');
  var cols = ['枠', '選手名', '展示T', 'ST', '能力', 'コース', '当日', '気象', '総合'];
  for (var i = 0; i < cols.length; i++) {
    var th = document.createElement('th');
    th.textContent = cols[i];
    htr.appendChild(th);
  }
  thead.appendChild(htr);
  table.appendChild(thead);

  var tbody = document.createElement('tbody');
  for (var j = 0; j < predictions.length; j++) {
    var p = predictions[j];
    var tr = document.createElement('tr');

    // 枠
    var tdWaku = document.createElement('td');
    var wakuEl = document.createElement('span');
    wakuEl.className = 'waku waku-' + p.lane;
    wakuEl.textContent = p.lane;
    tdWaku.appendChild(wakuEl);
    tr.appendChild(tdWaku);

    // 選手名・級別
    var tdName = document.createElement('td');
    tdName.className = 'td-name';
    var nameSpan = document.createElement('span');
    nameSpan.className = 'td-name-inner';
    nameSpan.textContent = formatName(p.name);
    tdName.appendChild(nameSpan);
    if (p.grade) {
      var gradeSpan = document.createElement('span');
      gradeSpan.className = 'td-grade pg-' + p.grade.replace(/\s/g, '');
      gradeSpan.textContent = p.grade;
      tdName.appendChild(gradeSpan);
    }
    tr.appendChild(tdName);

    // 展示タイム
    var tdExhibit = document.createElement('td');
    tdExhibit.className = 'score-cell';
    tdExhibit.textContent = fmtVal(p.exhibit_time, 2);
    tr.appendChild(tdExhibit);

    // ST
    var tdST = document.createElement('td');
    tdST.className = 'score-cell';
    tdST.textContent = fmtVal(p.start_timing, 2);
    tr.appendChild(tdST);

    // 選手能力
    var tdAbility = document.createElement('td');
    tdAbility.className = 'score-cell';
    tdAbility.textContent = fmtVal(p.score_ability, 1);
    tr.appendChild(tdAbility);

    // コース補正
    var tdCourse = document.createElement('td');
    tdCourse.className = 'score-cell';
    tdCourse.textContent = fmtVal(p.score_course, 1);
    tr.appendChild(tdCourse);

    // 当日情報
    var tdToday = document.createElement('td');
    tdToday.className = 'score-cell';
    tdToday.textContent = fmtVal(p.score_today, 1);
    tr.appendChild(tdToday);

    // 気象
    var tdWeather = document.createElement('td');
    tdWeather.className = 'score-cell';
    tdWeather.textContent = fmtVal(p.score_weather, 1);
    tr.appendChild(tdWeather);

    // 総合スコア
    var tdTotal = document.createElement('td');
    tdTotal.className = 'score-total';
    tdTotal.textContent = fmtVal(p.score_total, 1);
    tr.appendChild(tdTotal);

    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  wrap.appendChild(table);
  area.appendChild(wrap);
}

async function loadPrediction() {
  var area = document.getElementById('predArea');
  try {
    var url = API_BASE + '/predict.php?date=' + date + '&venue=' + encodeURIComponent(venue) + '&race_no=' + raceNo;
    var res = await fetch(url);
    var data = await res.json();

    if (data.error || !data.predictions || data.predictions.length === 0) {
      area.textContent = '';
      var err = document.createElement('div');
      err.className = 'error-msg';
      err.textContent = data.error || '直前情報が見つかりません';
      area.appendChild(err);
      return;
    }

    if (data.weather) {
      var ws = data.weather.wind_speed;
      var wh = data.weather.wave_height;
      document.getElementById('windSpeed').textContent = ws != null ? ws : '-';
      document.getElementById('waveHeight').textContent = wh != null ? wh : '-';
      document.getElementById('weatherWrap').style.display = '';
    }

    buildTable(data.predictions);
  } catch(e) {
    area.textContent = '';
    var err2 = document.createElement('div');
    err2.className = 'error-msg';
    err2.textContent = 'データの取得に失敗しました';
    area.appendChild(err2);
  }
}

loadPrediction();
</script>
</body>
</html>
