<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>艇王 - 会員登録</title>
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>

<header>
  <div class="logo">
    <a href="index.html">
      <h1>艇王</h1>
      <span class="logo-sub">ボートレース予測</span>
    </a>
  </div>
</header>

<div class="auth-container">
  <div class="auth-card">
    <h2>会員登録</h2>
    <div class="error-msg" id="errorMsg"></div>
    <form id="registerForm">
      <div class="form-group">
        <label for="name">名前</label>
        <input type="text" id="name" required placeholder="表示名を入力">
      </div>
      <div class="form-group">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" required placeholder="example@mail.com">
      </div>
      <div class="form-group">
        <label for="password">パスワード</label>
        <input type="password" id="password" required minlength="8" placeholder="8文字以上">
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">登録する</button>
    </form>
    <div class="auth-footer">
      既にアカウントをお持ちですか？ <a href="login.html">ログイン</a>
    </div>
  </div>
</div>

<footer>艇王 &copy; 2026</footer>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = '登録中...';

  try {
    const res = await fetch('register.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name:     document.getElementById('name').value,
        email:    document.getElementById('email').value,
        password: document.getElementById('password').value,
      }),
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error;
      errEl.style.display = 'block';
      return;
    }
    location.href = 'index.html';
  } catch {
    errEl.textContent = '通信エラーが発生しました';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '登録する';
  }
});
</script>
</body>
</html>
